set -g mouse on
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ',xterm-256color:Tc'
set-option -sa terminal-features ',xterm-256color:RGB'

bind '-' split-window -v -p 59 -c "#{pane_current_path}"

# Status bar top
set-option -g status-position top

# Windows index starts with 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Remove green color from Status bar
set -g status-style bg=default,fg=default
set-window-option -g window-status-style bg=default,fg=default
set-window-option -g window-status-current-style bg=default,fg=default

# AI Agent
bind-key a split-window -h -p 40 -c "#{pane_current_path}" "opencode"

